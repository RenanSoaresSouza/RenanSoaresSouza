<svg xmlns="http://www.w3.org/2000/svg"
     width="256"
     height="256"
     viewBox="0 0 256 256">

  <!-- Fundo quadrado arredondado -->
  <rect x="16"
        y="16"
        width="224"
        height="224"
        rx="48"
        fill="#6D28D9"/>


  <!-- Borda -->
  <rect x="24"
        y="24"
        width="208"
        height="208"
        rx="42"
        fill="none"
        stroke="#4C1D95"
        stroke-width="6"/>


  <!-- Corpo do chip -->
  <rect x="62"
        y="62"
        width="132"
        height="132"
        rx="16"
        fill="#111827"
        stroke="white"
        stroke-width="6"/>


  <!-- Pinos -->
  <g stroke="white"
     stroke-width="6"
     stroke-linecap="round">

    <line x1="42" y1="96" x2="62" y2="96"/>
    <line x1="42" y1="128" x2="62" y2="128"/>
    <line x1="42" y1="160" x2="62" y2="160"/>

    <line x1="194" y1="96" x2="214" y2="96"/>
    <line x1="194" y1="128" x2="214" y2="128"/>
    <line x1="194" y1="160" x2="214" y2="160"/>

    <line x1="96" y1="42" x2="96" y2="62"/>
    <line x1="128" y1="42" x2="128" y2="62"/>
    <line x1="160" y1="42" x2="160" y2="62"/>

    <line x1="96" y1="194" x2="96" y2="214"/>
    <line x1="128" y1="194" x2="128" y2="214"/>
    <line x1="160" y1="194" x2="160" y2="214"/>

  </g>


  <!-- Texto FPGA menor -->
  <text x="128"
        y="140"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="900"
        letter-spacing="1"
        fill="#FFFFFF">
        FPGA
  </text>


  <!-- Linha de circuito -->
  <path d="M96 158 H160"
        stroke="#A78BFA"
        stroke-width="5"
        stroke-linecap="round"/>

</svg>