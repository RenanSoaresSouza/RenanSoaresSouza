<svg xmlns="http://www.w3.org/2000/svg"
     width="256"
     height="256"
     viewBox="0 0 256 256">

  <!-- Fundo quadrado arredondado -->
  <rect x="16"
        y="16"
        width="224"
        height="224"
        rx="48"
        fill="#03234B"/>


  <!-- Borda interna -->
  <rect x="24"
        y="24"
        width="208"
        height="208"
        rx="42"
        fill="none"
        stroke="#00AEEF"
        stroke-width="6"/>


  <!-- Corpo do chip -->
  <rect x="72"
        y="72"
        width="112"
        height="112"
        rx="12"
        fill="#FFFFFF"/>


  <!-- Pinos -->
  <g stroke="#FFFFFF"
     stroke-width="6"
     stroke-linecap="round">

    <line x1="48" y1="96" x2="72" y2="96"/>
    <line x1="48" y1="128" x2="72" y2="128"/>
    <line x1="48" y1="160" x2="72" y2="160"/>

    <line x1="184" y1="96" x2="208" y2="96"/>
    <line x1="184" y1="128" x2="208" y2="128"/>
    <line x1="184" y1="160" x2="208" y2="160"/>

    <line x1="96" y1="48" x2="96" y2="72"/>
    <line x1="128" y1="48" x2="128" y2="72"/>
    <line x1="160" y1="48" x2="160" y2="72"/>

    <line x1="96" y1="184" x2="96" y2="208"/>
    <line x1="128" y1="184" x2="128" y2="208"/>
    <line x1="160" y1="184" x2="160" y2="208"/>

  </g>


  <!-- Texto STM32 menor -->
  <text x="128"
        y="124"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24"
        font-weight="900"
        fill="#03234B">
        STM32
  </text>


  <!-- Linha de firmware -->
  <path d="M96 145 H160"
        stroke="#00AEEF"
        stroke-width="5"
        stroke-linecap="round"/>


</svg>