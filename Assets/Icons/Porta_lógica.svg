<svg xmlns="http://www.w3.org/2000/svg"
     width="256"
     height="256"
     viewBox="0 0 256 256">

  <!-- Fundo quadrado arredondado -->
  <rect x="16"
        y="16"
        width="224"
        height="224"
        rx="48"
        fill="#0F172A"/>


  <!-- Borda -->
  <rect x="24"
        y="24"
        width="208"
        height="208"
        rx="42"
        fill="none"
        stroke="#2563EB"
        stroke-width="6"/>


  <!-- Circuito digital -->
  <g stroke="#60A5FA"
     stroke-width="7"
     fill="none"
     stroke-linecap="round"
     stroke-linejoin="round">


    <!-- Entradas -->
    <line x1="48"
          y1="96"
          x2="92"
          y2="96"/>

    <line x1="48"
          y1="160"
          x2="92"
          y2="160"/>


    <!-- Porta AND -->
    <path d="M92 78
             H124
             C160 78 160 178 124 178
             H92
             Z"/>


    <!-- Saída conectada -->
    <line x1="156"
          y1="128"
          x2="208"
          y2="128"/>

  </g>


  <!-- Pontos de conexão -->
  <g fill="#60A5FA">

    <circle cx="48"
            cy="96"
            r="7"/>

    <circle cx="48"
            cy="160"
            r="7"/>

    <circle cx="208"
            cy="128"
            r="7"/>

  </g>

</svg>